server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        # Route requests targeting /api/v1/accounts/** to the Account service
        - id: account-management-service
          uri: ${ACCOUNT_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/v1/accounts/**
        
        # Route requests targeting /api/v1/loans/** to the Loan Workflow service
        - id: loan-approval-workflow-service
          uri: ${LOAN_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/loans/**

logging:
  level:
    org.springframework.cloud.gateway: TRACE
    org.springframework.web: INFO
