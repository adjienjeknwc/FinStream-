name: FinStream Core Services CI/CD

# Trigger the workflow on push or pull requests to the main branch
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Global environment placeholders showing clean configuration separation
env:
  DOCKER_REGISTRY: ${{ secrets.CONTAINER_REGISTRY || 'docker.io' }}
  IMAGE_NAMESPACE: finstream
  JAVA_VERSION: '21'
  JVM_DISTRIBUTION: 'temurin' # Eclipse Temurin distribution
  # Enterprise database & broker configuration secrets placeholders
  PROD_DB_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
  KAFKA_SASL_JAAS_CONFIG: ${{ secrets.KAFKA_SASL_JAAS_CONFIG }}

jobs:
  build-and-test:
    name: Build, Verify Business Rules, and Dockerize
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the codebase
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      # Step 2: Set up Java 21 JDK environment with built-in dependency caching
      - name: Initialize Java 21 JDK (${{ env.JVM_DISTRIBUTION }})
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JVM_DISTRIBUTION }}
          cache: 'maven' # Automatically caches ~/.m2 dependencies to accelerate workflows

      # Step 3: Compile and run Mockito unit tests for the Account Management Service
      - name: Build & Validate Account-Management-Service
        run: |
          cd account-management-service
          mvn -B clean test package

      # Step 4: Compile and build the Loan-Approval-Workflow-Service
      - name: Build & Validate Loan-Approval-Workflow-Service
        run: |
          cd loan-approval-workflow-service
          mvn -B clean package -DskipTests # Skip tests if Camunda cluster connection is required in build environment

      # Step 5: Compile and build the Notification-Audit-Service
      - name: Build & Validate Notification-Audit-Service
        run: |
          cd notification-audit-service
          mvn -B clean test package

      # Step 6: Log in to the Container Registry (demonstrates secret credentials integration)
      - name: Authenticate with Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      # Step 7: Build the production container (verifies multi-stage Dockerfile correctness)
      - name: Build & Verify Production Docker Image
        run: |
          cd account-management-service
          docker build \
            --tag ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/account-management-service:${{ github.sha }} \
            --tag ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/account-management-service:latest \
            .

      # Step 8: Placeholder step demonstrating deployment push sequence
      - name: Push Container Package to Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "Simulating push to ${{ env.DOCKER_REGISTRY }}"
          # docker push ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/account-management-service:${{ github.sha }}
          # docker push ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/account-management-service:latest
